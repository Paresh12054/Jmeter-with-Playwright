name: JMeter + Playwright + Confluence Combined Pipeline with Confluence Report

on:
  workflow_dispatch:

jobs:
  performance-and-ui:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------
      # Setup Node
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # -------------------------
      # Install JMeter
      # -------------------------
      - name: Install JMeter
        run: |
          JMETER_VERSION=5.6.3
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-$JMETER_VERSION.tgz
          tar -xzf apache-jmeter-$JMETER_VERSION.tgz
          mv apache-jmeter-$JMETER_VERSION jmeter

      # -------------------------
      # Start JMeter
      # -------------------------
      - name: Start JMeter Test
        run: |
          nohup ./jmeter/bin/jmeter -n -t scripts/GithubTest_combined.jmx -l results.jtl -Jduration=600 > jmeter.log 2>&1 &
          echo $! > jmeter.pid

      # -------------------------
      # Run Playwright periodically
      # -------------------------
      - name: Run Playwright periodically
        run: |
          END=$((SECONDS+600))
          PASSED=0
          FAILED=0

          while [ $SECONDS -lt $END ]; do
            TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")

            echo "Running Playwright tests at $TIMESTAMP..."

            RESULT_FILE="pw-result-$TIMESTAMP.json"

            npx playwright test tests/Demo1.spec.ts --reporter=json > $RESULT_FILE || true

            if [ -f "$RESULT_FILE" ]; then
              P=$(grep -o '"status":"passed"' $RESULT_FILE | wc -l)
              F=$(grep -o '"status":"failed"' $RESULT_FILE | wc -l)

              PASSED=$((PASSED + P))
              FAILED=$((FAILED + F))
            fi

            echo "Sleeping for 3 minutes..."
            sleep 180
          done

          echo $PASSED > pw_passed.txt
          echo $FAILED > pw_failed.txt

      # -------------------------
      # Stop JMeter
      # -------------------------
      - name: Stop JMeter
        run: |
          kill $(cat jmeter.pid) || true

      # -------------------------
      # Generate JMeter Report
      # -------------------------
      - name: Generate JMeter HTML Report
        run: |
          ./jmeter/bin/jmeter -g results.jtl -o report

      # -------------------------
      # Extract JMeter Metrics (FIXED)
      # -------------------------
      - name: Extract JMeter Metrics
        run: |
          echo "Parsing JMeter results.jtl..."

          TOTAL=$(grep -c "<httpSample" results.jtl || true)
          FAILURES=$(grep -c 's="false"' results.jtl || true)

          if [ "$TOTAL" -eq 0 ]; then TOTAL=1; fi

          ERROR_PERCENT=$(awk "BEGIN {printf \"%.2f\", ($FAILURES/$TOTAL)*100}")

          AVG_RESPONSE=$(awk -F't="' '{sum+=$2; count++} END {if(count>0) print int(sum/count); else print 0}' results.jtl)

          echo $AVG_RESPONSE > avg_response.txt
          echo $ERROR_PERCENT > error_percent.txt

          echo "JMeter Avg Response: $AVG_RESPONSE"
          echo "JMeter Error %: $ERROR_PERCENT"

      # -------------------------
      # DEBUG STEP (VERY IMPORTANT)
      # -------------------------
      - name: Debug Metrics & Files
        run: |
          echo "===== FILE LIST ====="
          ls -l

          echo "===== JMeter Files ====="
          ls -l results.jtl || true
          ls -l jmeter.log || true

          echo "===== Playwright JSON Files ====="
          ls -l pw-result-*.json || true

          echo "===== Metric Files ====="
          cat avg_response.txt || echo "avg_response missing"
          cat error_percent.txt || echo "error_percent missing"
          cat pw_passed.txt || echo "pw_passed missing"
          cat pw_failed.txt || echo "pw_failed missing"

      # -------------------------
      # Upload Artifacts
      # -------------------------
      - name: Upload JMeter Report
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-report
          path: report

      - name: Upload Playwright Results
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          path: pw-result-*.json

      # -------------------------
      # Publish to Confluence (FIXED)
      # -------------------------
      - name: Publish Results to Confluence
        shell: bash
        run: |
          TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")

          AVG_RESPONSE=$(cat avg_response.txt)
          ERROR_PERCENT=$(cat error_percent.txt)
          PW_PASSED=$(cat pw_passed.txt)
          PW_FAILED=$(cat pw_failed.txt)

          CONTENT="<h1>Automated Test Report</h1>
          <p><b>Timestamp:</b> $TIMESTAMP</p>

          <h2>JMeter Metrics</h2>
          <ul>
            <li>Average Response Time: $AVG_RESPONSE ms</li>
            <li>Error Percentage: $ERROR_PERCENT %</li>
          </ul>

          <h2>Playwright Results</h2>
          <ul>
            <li>Passed: $PW_PASSED</li>
            <li>Failed: $PW_FAILED</li>
          </ul>"

          ESCAPED_CONTENT=$(printf '%s' "$CONTENT" | awk '{printf "%s\\n", $0}')

          curl -u "${{ secrets.CONFLUENCE_EMAIL }}:${{ secrets.CONFLUENCE_API_TOKEN }}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"type\": \"page\",
              \"title\": \"Test Report - $TIMESTAMP\",
              \"space\": {
                \"key\": \"${{ secrets.CONFLUENCE_SPACE_KEY }}\"
              },
              \"body\": {
                \"storage\": {
                  \"value\": \"$ESCAPED_CONTENT\",
                  \"representation\": \"storage\"
                }
              }
            }" \
            "${{ secrets.CONFLUENCE_BASE_URL }}/rest/api/content/"
