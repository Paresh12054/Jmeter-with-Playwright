name: JMeter + Playwright Combined Pipeline

on:
  workflow_dispatch:

jobs:
  performance-and-ui:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------
      # Setup Node (Playwright)
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Node Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # -------------------------
      # Install JMeter
      # -------------------------
      - name: Install JMeter
        run: |
          JMETER_VERSION=5.6.3
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-$JMETER_VERSION.tgz
          tar -xzf apache-jmeter-$JMETER_VERSION.tgz
          mv apache-jmeter-$JMETER_VERSION jmeter

      # -------------------------
      # Start JMeter (Background)
      # -------------------------
      - name: Start JMeter Test
        run: |
          nohup ./jmeter/bin/jmeter -n -t scripts/GithubTest_combined.jmx -l results.jtl -Jduration=600 > jmeter.log 2>&1 &
          echo $! > jmeter.pid

      # -------------------------
      # Run Playwright periodically
      # -------------------------
      - name: Run Playwright periodically
        run: |
          END=$((SECONDS+600))

          while [ $SECONDS -lt $END ]; do
            TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")

            echo "Running Playwright tests at $TIMESTAMP..."

            # Run with JSON reporter for parsing
            npx playwright test tests/Demo1.spec.ts --reporter=json || true

            # Save JSON output
            mkdir -p playwright-results-$TIMESTAMP
            mv test-results.json playwright-results-$TIMESTAMP/results.json 2>/dev/null || true

            echo "Sleeping for 3 minutes..."
            sleep 180
          done

      # -------------------------
      # Stop JMeter
      # -------------------------
      - name: Stop JMeter
        run: |
          kill $(cat jmeter.pid) || true

      # -------------------------
      # Generate JMeter HTML Report
      # -------------------------
      - name: Generate HTML Report
        run: |
          ./jmeter/bin/jmeter -g results.jtl -o report

      # -------------------------
      # Extract Metrics
      # -------------------------
      - name: Extract Metrics
        run: |
          echo "Parsing JMeter results..."

          TOTAL=$(grep -c "<httpSample" results.jtl || true)
          FAILURES=$(grep -c 's="false"' results.jtl || true)

          if [ "$TOTAL" -eq 0 ]; then TOTAL=1; fi

          ERROR_PERCENT=$(awk "BEGIN {printf \"%.2f\", ($FAILURES/$TOTAL)*100}")

          AVG_RESPONSE=$(awk -F't="' '{sum+=$2; count++} END {if(count>0) print int(sum/count); else print 0}' results.jtl)

          echo "JMETER_TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "JMETER_FAILURES=$FAILURES" >> $GITHUB_ENV
          echo "JMETER_ERROR_PERCENT=$ERROR_PERCENT" >> $GITHUB_ENV
          echo "JMETER_AVG_RESPONSE=$AVG_RESPONSE" >> $GITHUB_ENV

          echo "Parsing Playwright results..."

          PASSED=$(grep -o '"status":"passed"' playwright-results-*/results.json 2>/dev/null | wc -l || true)
          FAILED=$(grep -o '"status":"failed"' playwright-results-*/results.json 2>/dev/null | wc -l || true)

          echo "PW_PASSED=$PASSED" >> $GITHUB_ENV
          echo "PW_FAILED=$FAILED" >> $GITHUB_ENV

      # -------------------------
      # Zip Reports
      # -------------------------
      - name: Zip Reports
        run: |
          zip -r jmeter-report.zip report
          zip -r playwright-results.zip playwright-results-* || true

      # -------------------------
      # Upload Artifacts
      # -------------------------
      - name: Upload JMeter Report
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-report
          path: report

      - name: Upload Playwright Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: playwright-results-*

      # -------------------------
      # Publish to Confluence
      # -------------------------
      - name: Publish Results to Confluence
        if: always()
        run: |
          TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")
          PAGE_TITLE="Performance Test Report - $TIMESTAMP"

          GITHUB_RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          CONTENT="<h1>Performance Test Results</h1>
          <p><b>Execution Time:</b> $TIMESTAMP</p>

          <h2>JMeter Metrics</h2>
          <ul>
            <li>Total Requests: $JMETER_TOTAL</li>
            <li>Failures: $JMETER_FAILURES</li>
            <li>Error %: $JMETER_ERROR_PERCENT%</li>
            <li>Avg Response Time: $JMETER_AVG_RESPONSE ms</li>
          </ul>

          <h2>Playwright Results</h2>
          <ul>
            <li>Passed: $PW_PASSED</li>
            <li>Failed: $PW_FAILED</li>
          </ul>

          <h2>Reports</h2>
          <ul>
            <li><a href='$GITHUB_RUN_URL'>View Full GitHub Run & Download Reports</a></li>
          </ul>"

          curl -u "${{ secrets.CONFLUENCE_EMAIL }}:${{ secrets.CONFLUENCE_API_TOKEN }}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"type\": \"page\",
              \"title\": \"$PAGE_TITLE\",
              \"space\": {\"key\": \"${{ secrets.CONFLUENCE_SPACE_KEY }}\"},
              \"body\": {
                \"storage\": {
                  \"value\": \"$CONTENT\",
                  \"representation\": \"storage\"
                }
              }
            }" \
            "${{ secrets.CONFLUENCE_BASE_URL }}/rest/api/content/"
