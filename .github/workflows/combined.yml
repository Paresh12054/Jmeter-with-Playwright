name: JMeter + Playwright Combined Pipeline

on:
  workflow_dispatch:

jobs:
  performance-and-ui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------
      # Install Node (Playwright)
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Node Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # -------------------------
      # Install JMeter
      # -------------------------
      - name: Install JMeter
        run: |
          JMETER_VERSION=5.6.3
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-$JMETER_VERSION.tgz
          tar -xzf apache-jmeter-$JMETER_VERSION.tgz
          mv apache-jmeter-$JMETER_VERSION jmeter

      # -------------------------
      # Run JMeter (10 mins) in background
      # -------------------------
      - name: Start JMeter Test
        run: |
          ./jmeter/bin/jmeter -n -t GithubTest_combined.jmx -l results.jtl -Jduration=600 &
          echo $! > jmeter.pid

      # -------------------------
      # Run Playwright every 4 mins for 10 mins
      # -------------------------
      - name: Run Playwright periodically
        run: |
          END=$((SECONDS+600))

          while [ $SECONDS -lt $END ]; do
            TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")

            echo "Running Playwright tests at $TIMESTAMP..."

            npx playwright test tests/Demo1.spec.ts --reporter=html

            mv playwright-report "playwright-report-$TIMESTAMP"

            echo "Sleeping for 3 minutes..."
            sleep 180
          done
      # -------------------------
      # Stop JMeter
      # -------------------------
      - name: Stop JMeter
        run: |
          kill $(cat jmeter.pid) || true

      # -------------------------
      # Upload Reports
      # -------------------------
          
      - name: Generate HTML Report
        run: |
          ./jmeter/bin/jmeter -g results.jtl -o report

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-report
          path: report

      - name: Upload Playwright Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          path: playwright-report-*
